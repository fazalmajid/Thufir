version: '3.9'

services:
  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: "postgresql://thufir:${POSTGRES_PASSWORD:-UI0iW4-7DJ6Go-zBwcn4}@zulfiqar:5432/thufir"
      ELECTRIC_WRITE_TO_PG_MODE: "direct_writes"
      LOGICAL_PUBLISHER_HOST: zulfiqar
      ELECTRIC_INSECURE: "true"
    ports:
      - "3000:3000"
    extra_hosts:
      - "zulfiqar:10.0.0.29"

  api:
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://thufir:${POSTGRES_PASSWORD:-UI0iW4-7DJ6Go-zBwcn4}@zulfiqar:5432/thufir"
      NODE_ENV: "${NODE_ENV:-development}"
      PORT: 3001
      RP_ID: "${RP_ID:-localhost}"
      RP_ORIGIN: "${RP_ORIGIN:-http://localhost:5173}"
    ports:
      - "3001:3001"
    volumes:
      - ./docker/api:/app
      - /app/node_modules
    command: npm run dev
    extra_hosts:
      - "zulfiqar:10.0.0.29"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3001}"
        VITE_ELECTRIC_URL: "${VITE_ELECTRIC_URL:-http://localhost:3000}"
    environment:
      NODE_ENV: "${NODE_ENV:-development}"
    ports:
      - "5173:5173"
    depends_on:
      - electric
      - api
