version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thufir
      POSTGRES_USER: thufir
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thufir"]
      interval: 10s
      timeout: 5s
      retries: 5

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: "postgresql://thufir:${POSTGRES_PASSWORD:-changeme}@postgres:5432/thufir"
      ELECTRIC_WRITE_TO_PG_MODE: "direct_writes"
      LOGICAL_PUBLISHER_HOST: postgres
      ELECTRIC_INSECURE: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://thufir:${POSTGRES_PASSWORD:-changeme}@postgres:5432/thufir"
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./docker/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
