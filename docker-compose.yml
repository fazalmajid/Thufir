version: '3.9'

services:
  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: "postgresql://thufir:${POSTGRES_PASSWORD:-UI0iW4-7DJ6Go-zBwcn4}@zulfiqar:5432/thufir"
      ELECTRIC_WRITE_TO_PG_MODE: "direct_writes"
      LOGICAL_PUBLISHER_HOST: zulfiqar
      ELECTRIC_INSECURE: "true"
    ports:
      - "3000:3000"
    extra_hosts:
      - "zulfiqar:10.0.0.29"

  api:
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://thufir:${POSTGRES_PASSWORD:-UI0iW4-7DJ6Go-zBwcn4}@zulfiqar:5432/thufir"
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./docker/api:/app
      - /app/node_modules
    command: npm run dev
    extra_hosts:
      - "zulfiqar:10.0.0.29"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      NODE_ENV: development
      VITE_API_URL: "http://localhost:3001"
      VITE_ELECTRIC_URL: "http://localhost:3000"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - electric
      - api
